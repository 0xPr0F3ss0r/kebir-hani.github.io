name: Deploy Jaspr site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4

      # 2. Install Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable

      # 3. Install dependencies
      - name: Get dependencies
        run: flutter pub get

      # 4. Activate Jaspr CLI
      - name: Activate Jaspr CLI
        run: flutter pub global activate jaspr_cli

      # 5. Build Jaspr site
      - name: Build Jaspr site
        run: flutter pub global run jaspr_cli:jaspr build

      # 6. Upload build folder
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/jaspr

      # 7. Deploy to GitHub Pages
      - id: deployment
        uses: actions/deploy-pages@v4
